<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>To Tu</title>
    <style>
        .header{
            position: relative;
            text-align: center;
        }
        #box1{  
            background-color: rgb(113, 175, 164);
            text-align: center;
            text-shadow: 20px;
            height: 650px;
            width: auto;
            position: relative;
            
        }
        #box{
            width: 300px;
            height: 200px;
            background: rgb(204, 212, 169);
            border: 2px solid black;
            margin: auto;
            border-radius: 20px/20px;
            position: relative;
            top: 20%;
        }
        #box2{
            width: 0px;
            height: 0px;
            border: 150px solid;
            border-color: rgb(158, 157, 131) transparent transparent transparent;
            border-radius: 20px/20px;
            float: left;
        }
        #box3{
            width: 0px;
            height: 0px;
            margin-left: 135px;
            margin-top: 125px;
            border: 15px solid rgb(54, 66, 74);
            border-radius: 100px/100px;
            position: absolute;
        }
        .footer{
            position: absolute;
            width: 100%;
            height: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">A letter to Tu...</div>
    <div id="box1">  
        <div id="box">
            <div id="box2"></div>
            <div id="box3"></div>
        </div>
    </div>
    <div class="footer">@SinETopia Presents.</div>
    <script type="text/javascript">
        var bDiv = document.getElementById('box3');
        bDiv.onclick = function() {
            document.getElementById('box2').style.display = "none";
            document.getElementById('box3').style.display = "none";
        }
    </script>
</body>
</html>
