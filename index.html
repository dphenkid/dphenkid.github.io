<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>test site</title>
    <style>
        #box{
            width: 500px;
            height: 300px;
            background: rgb(204, 212, 169);
            border: 1px solid black;
            margin: auto;
            border-radius: 20px/20px;
        }
        #box2{
            width: 0px;
            height: 0px;
            border: 250px solid black;
            border-color: rgb(158, 157, 131) transparent transparent transparent;
            border-radius: 20px/20px;
            float: left;
        }
        #box3{
            width: 0px;
            height: 0px;
            margin-left: 220px;
            margin-top: 215px;
            border: 30px solid rgb(54, 66, 74);
            border-radius: 100px/100px;
            position: absolute;
        }
    </style>
</head>
<body>
    <div id="box">
        <div id="box2"></div>
        <div id="box3"></div>
    </div>
</body>
</html>
